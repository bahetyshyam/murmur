appId: com.murmur.app
productName: Murmur
directories:
  output: release
files:
  - out/**/*
  - package.json
  - native/build/Release/*.node
# Native .node binaries can't be require'd from inside app.asar — unpack them.
asarUnpack:
  - native/build/Release/*.node
mac:
  category: public.app-category.productivity
  target:
    - dir
  # Skip signing for this local test build (ad-hoc). Proper self-signed +
  # hardened-runtime signing is wired up in Phase J.
  identity: null
  extendInfo:
    # No LSUIElement: Murmur shows a Dock icon (clicking it opens Settings). The
    # menu-bar tray is kept too, but macOS 26 "Tahoe" has a known bug that hides
    # third-party menu-bar items, so the Dock is the reliable entry point.
    NSMicrophoneUsageDescription: Murmur records audio while you hold the hotkey so it can be transcribed.
    LSMinimumSystemVersion: "14.0"
