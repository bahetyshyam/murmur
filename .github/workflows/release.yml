name: release

# Build + publish a self-signed release to GitHub Releases on a v* tag.
# electron-builder uploads the .dmg, .zip and latest-mac.yml that electron-updater
# reads. See RELEASING.md for the signing-identity + verification requirements.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon runner — matches the arm64 target
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Build the native CGEventTap addon against the Electron ABI + rebuild
      # better-sqlite3 for Electron.
      - name: Build native modules
        run: npm run build:native

      - name: Build renderer + main
        run: npx electron-vite build

      # electron-builder imports the self-signed .p12 from CSC_LINK (base64) into a
      # temporary keychain and signs every nested binary with it — the SAME identity
      # every release, so the designated requirement (and thus users' Accessibility
      # + microphone grants) survive across auto-updates. If the secrets are unset,
      # it falls back to ad-hoc, which BREAKS TCC persistence — see RELEASING.md.
      - name: Package + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: npx electron-builder --mac --publish always
