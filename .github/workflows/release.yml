name: Build & Release

# Triggers:
#   - push a tag like `v0.1.0` → builds Murmur.app, zips it, and publishes a
#     GitHub Release with the zip attached. This is the URL linked from the
#     README's "Download" section (releases/latest).
#   - Manual run from the Actions tab → builds and uploads the zip as a
#     workflow artifact (useful for testing the pipeline without cutting a
#     real release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed by softprops/action-gh-release to create releases

jobs:
  build:
    name: Build Murmur.app (macOS 14)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build release (.app + .zip)
        run: ./scripts/build_release.sh

      - name: List dist/
        run: ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Murmur-macos
          path: dist/Murmur-*.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Murmur-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
